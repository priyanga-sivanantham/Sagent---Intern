<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Feedback</title>
    <style>
        :root {
            --bg: #eef3ea;
            --card: #fbfdf9;
            --text: #1f2a20;
            --accent: #2f6f4f;
            --accent-dark: #1f5138;
            --muted: #5c6c5f;
            --border: #d8e4d8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top left, #d7ead9, transparent 30%),
                linear-gradient(160deg, var(--bg), #e3ede2);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(680px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(34, 58, 40, 0.12);
            padding: 32px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
        }
        p {
            color: var(--muted);
            line-height: 1.6;
        }
        .meta {
            margin: 22px 0;
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #fff;
            display: grid;
            gap: 10px;
        }
        .meta strong {
            display: inline-block;
            width: 88px;
            color: var(--text);
        }
        label {
            display: block;
            font-weight: 700;
            margin: 18px 0 8px;
        }
        select, textarea, button {
            width: 100%;
            font: inherit;
        }
        select, textarea {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: white;
        }
        textarea {
            min-height: 160px;
            resize: vertical;
        }
        button {
            margin-top: 18px;
            border: 0;
            border-radius: 999px;
            padding: 14px 16px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: var(--accent);
        }
        button:disabled { opacity: 0.6; cursor: wait; }
        .message {
            margin-top: 18px;
            min-height: 24px;
            font-weight: 600;
        }
        .error { color: #b42318; }
        .success { color: var(--accent-dark); }
    </style>
</head>
<body>
<main class="card">
    <p>Share your experience</p>
    <h1 id="eventName">Loading...</h1>
    <p id="intro">Please wait while we load your feedback form.</p>

    <section class="meta" id="details" hidden>
        <div><strong>Guest</strong><span id="guestName"></span></div>
        <div><strong>Date</strong><span id="eventDate"></span></div>
        <div><strong>Venue</strong><span id="venue"></span></div>
        <div><strong>Email</strong><span id="guestEmail"></span></div>
    </section>

    <form id="feedbackForm" hidden>
        <label for="rating">Rating</label>
        <select id="rating" required>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Very Poor</option>
        </select>

        <label for="comments">Feedback</label>
        <textarea id="comments" placeholder="Tell us about your experience." required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <div class="message" id="message"></div>
</main>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const messageEl = document.getElementById("message");
    const form = document.getElementById("feedbackForm");
    const button = form.querySelector("button");

    function setMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + (type || "");
    }

    async function loadForm() {
        if (!token) {
            setMessage("Feedback token is missing.", "error");
            document.getElementById("eventName").textContent = "Invalid feedback link";
            return;
        }

        const response = await fetch(`/feedback/form?token=${encodeURIComponent(token)}`);
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.message || "Unable to load feedback form");
        }

        document.getElementById("eventName").textContent = data.eventName;
        document.getElementById("intro").textContent = "Please rate the event and share your feedback.";
        document.getElementById("guestName").textContent = data.guestName;
        document.getElementById("eventDate").textContent = data.eventDate;
        document.getElementById("venue").textContent = data.venue;
        document.getElementById("guestEmail").textContent = data.guestEmail;
        document.getElementById("details").hidden = false;
        form.hidden = false;
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        setMessage("Submitting your feedback...", "");

        try {
            const response = await fetch("/feedback/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token,
                    rating: Number(document.getElementById("rating").value),
                    comments: document.getElementById("comments").value
                })
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || "Unable to submit feedback");
            }
            form.hidden = true;
            setMessage("Thank you. Your feedback has been submitted.", "success");
        } catch (error) {
            setMessage(error.message, "error");
            button.disabled = false;
        }
    });

    loadForm().catch((error) => {
        document.getElementById("eventName").textContent = "Feedback unavailable";
        document.getElementById("intro").textContent = "We could not load this feedback form.";
        setMessage(error.message, "error");
    });
</script>
</body>
</html>
